<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculando</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="calculator">
            <section id="screen">
                <input type="text" name="screen" id="c_input" disabled>
            </section>
            <section id="keys-set">
                <div id="numbers">
                    <div class="key seven">7</div>
                    <div class="key eight">8</div>
                    <div class="key nine">9</div>
                    <div class="key four">4</div>
                    <div class="key five">5</div>
                    <div class="key six">6</div>
                    <div class="key one">1</div>
                    <div class="key two">2</div>
                    <div class="key three">3</div>
                    <div class="key zero">0</div>
                    <div class="key dblzero">00</div>
                </div>

                <div id="operators">
                    <div class="key plus" onclick="sum()">+</div>
                    <div class="key minus" onclick="sub()">-</div>
                    <div class="key times" onclick="mult()">X</div>
                    <div class="key divi" onclick="div()">%</div>
                    <div class="key equal" onclick="tot()">=</div>
                </div>
            </section>
        </div>
    </main>
    <script>

        var c_screen = document.querySelector('input#c_input')
        var num_board = document.querySelector('div#numbers')
        var seven = document.querySelector('div.seven')
        var eight = document.querySelector('div.eight')
        var nine = document.querySelector('div.nine')
        var plus = document.querySelector('div.plus')
        var four = document.querySelector('div.four')
        var five = document.querySelector('div.five')
        var six = document.querySelector('div.six')
        var minus = document.querySelector('div.minus')
        var one = document.querySelector('div.one')
        var two = document.querySelector('div.two')
        var three = document.querySelector('div.three')
        var equal = document.querySelector('div.equal')
        var zero = document.querySelector('div.zero')
        var result = 0
        const calc = []
        var isClicked = false

        

        //A SINTAXE IMEDIATAMENTE ABAIXO NÃO FOI ENSINADA, PORÉM JÁ APRENDIDA PARA O EXERCÍCIO PESSOAL ACTUAL.

        num_board.addEventListener('click', function(k) {
            if (isClicked == true){
                c_screen.value = k.target.innerText
                isClicked = false
                
            }else{
                c_screen.value = c_screen.value + k.target.innerText
            }

            }
                
        )

        function sum() {
            isClicked = true
            if (calc.length == 0) {
                calc.push(c_screen.value)
                calc.push('+')
            }else if (calc[1] == '-') {
                calc.push(c_screen.value)
                result = Number(calc[0] - Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('+')
            
            }else if (calc[1] == 'x') {
                calc.push(c_screen.value)
                result = Number(calc[0] * Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('+')
            
            }else if (calc[1] == '%') {
                calc.push(c_screen.value)
                result = Number(calc[0] / Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('+')
                
            }else{
                calc.push(c_screen.value)
                result = Number(calc[0]) + Number(calc[2])
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('+')
            }

            
        }

        function sub() {
            isClicked = true
            if (calc.length == 0) {
                calc.push(c_screen.value)
                calc.push('-')

            }else if (calc[1] == '+') {
                calc.push(c_screen.value)
                result = Number(calc[0]) + Number(calc[2])
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('-')
            
            }else if (calc[1] == 'x') {
                calc.push(c_screen.value)
                result = Number(calc[0] * Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('-')
            
            }else if (calc[1] == '%') {
                calc.push(c_screen.value)
                result = Number(calc[0] / Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('-')

            }else{
                calc.push(c_screen.value)
                result = Number(calc[0]) - Number(calc[2])
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('-')
            }

        }

        function mult() {
            isClicked = true
            if (calc.length == 0) {
                calc.push(c_screen.value)
                calc.push('x')

            }else if (calc[1] == '%') {
                calc.push(c_screen.value)
                result = Number(calc[0] / Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('x')
            
            }else if (calc[1] == '-') {
                calc.push(c_screen.value)
                result = Number(calc[0] - Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('x')

            }else if (calc[1] == '+') {
                calc.push(c_screen.value)
                result = Number(calc[0] + Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('x')
            
            }else{
                calc.push(c_screen.value)
                result = Number(calc[0]) * Number(calc[2])
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('x')
            }
        }

        function div() {
            isClicked = true
            if (calc.length == 0) {
                calc.push(c_screen.value)
                calc.push('%')

            }else if (calc[1] == 'x') {
                calc.push(c_screen.value)
                result = Number(calc[0] * Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('%')
            
            }else if (calc[1] == '-') {
                calc.push(c_screen.value)
                result = Number(calc[0] - Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('%')

            }else if (calc[1] == '+') {
                calc.push(c_screen.value)
                result = Number(calc[0] + Number(calc[2]))
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('%')

            }else{
                calc.push(c_screen.value)
                result = Number(calc[0]) / Number(calc[2])
                c_screen.value = `${result}`
                calc.length = 0
                calc.push(result)
                calc.push('%')
            }
        }

        function tot() {
            isClicked = true
            if (calc.length == 0) {
                c_screen.value = c_screen.value
            }else{
                if (calc[1] == '+') {
                    calc.push(c_screen.value)
                    result = Number(calc[0]) + Number(calc[2])
                    c_screen.value = `${result}`
                    calc.length = 0
                }else if (calc[1] == '-') {
                    calc.push(c_screen.value)
                    result = Number(calc[0]) - Number(calc[2])
                    c_screen.value = `${result}`
                    calc.length = 0
                }else if (calc[1] =='x') {
                    calc.push(c_screen.value)
                    result = Number(calc[0]) * Number(calc[2])
                    c_screen.value = `${result}`
                    calc.length = 0
                }else{
                    calc.push(c_screen.value)
                    result = Number(calc[0]) / Number(calc[2])
                    c_screen.value = `${result}`
                    calc.length = 0
                }
            }
        }
    </script>
</body>
</html>
