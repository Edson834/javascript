<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var nome = window.prompt('E aí. Qual seu nome?')
        window.confirm(`Quer ver algo interessante ${nome}?`)

        var n1 = window.prompt('Digite um número:')
        var n2 = window.prompt('Digite um número mais uma vez:')
        var soma = Number(n1) + Number(n2)
        
        window.alert(`A soma entre ${n1} e ${n2} é de: ${soma.toFixed(2)}`)
        
    </script>
</body>
</html>
