<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body {
            font: normal 20px Arial;
        }

        input {
            font: normal 18px Arial;
            width: 100px;
        }

        div {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1" onfocus="process()">
    <input type="number" name="txtn2" id="txtn2" onfocus="process()">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>

    <script>
        function process() {
            var res = window.document.getElementById('res')
            res.innerText = 'Processando...'
        }
        function somar() {
            var n1 = Number(window.document.getElementById('txtn1').value)
            var n2 = Number(window.document.querySelector('input#txtn2').value)
            var res = window.document.querySelector('div#res')
            var s = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${s}</strong>`
        }

    </script>
</body>
</html>
